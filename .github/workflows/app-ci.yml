name: App CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.logic.json'
      - 'jest.config.js'
      - 'babel.config.js'
      - 'app.json'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.logic.json'
      - 'jest.config.js'
      - 'babel.config.js'
      - 'app.json'
      - '.github/workflows/app-ci.yml'
  workflow_dispatch:

jobs:
  verify-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck logic layer
        run: npm run typecheck:logic

      - name: Run Jest tests
        run: npm run test:ci
