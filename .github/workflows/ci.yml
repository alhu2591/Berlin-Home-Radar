name: Berlin Home Radar CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'app/**'
      - 'src/**'
      - 'workers/**'
      - 'package.json'
      - 'workers/package.json'
      - 'tsconfig.json'
      - 'tsconfig.logic.json'
      - 'workers/tsconfig.json'
      - 'babel.config.js'
      - 'app.json'
      - '.nvmrc'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'src/**'
      - 'workers/**'
      - 'package.json'
      - 'workers/package.json'
      - 'tsconfig.json'
      - 'tsconfig.logic.json'
      - 'workers/tsconfig.json'
      - 'babel.config.js'
      - 'app.json'
      - '.nvmrc'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  verify-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install app dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck logic layer
        run: npm run typecheck:logic

  verify-connectors:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: workers
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '../.nvmrc'
          cache: 'npm'
          cache-dependency-path: workers/package.json

      - name: Install worker dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck worker
        run: npm run typecheck
